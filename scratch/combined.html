function msgbox(type, title, content, link="", callback=null, height=180, width=500, hasRetry=false, contentStyle="") {
$(body).scrollTo(0, 0);
if (!type) {
closeMsgbox();
return;
}
var remember = false;
try { remember = handler.get_remember(); } catch(e) {}
var autoLogin = false;
try { autoLogin = handler.get_option("auto-login") != ''; } catch(e) {}
width += is_xfce ? 50 : 0;
height += is_xfce ? 50 : 0;
if (type.indexOf("input-password") >= 0) {
callback = function (res) {
if (!res) {
view.close();
return;
}
handler.login("", "", res.password, res.remember);
if (!is_port_forward) {
// Specially handling file transfer for no permission hanging issue (including 60ms
// timer in setPermission.
// For wrong password input hanging issue, we can not use handler.msgbox.
// But how about wrong password for file transfer?
if (is_file_transfer) handler.msgbox("connecting", "Connecting...", "Logging in...");
else msgbox("connecting", "Connecting...", "Logging in...");
}
};
} else if (type.indexOf("input-2fa") >= 0) {
callback = function (res) {
if (!res) {
view.close();
return;
}
handler.send2fa(res.code, res.trust_this_device || false);
msgbox("connecting", "Connecting...", "Logging in...");
};
} else if (type == "session-login" || type == "session-re-login") {
callback = function (res) {
if (!res) {
view.close();
return;
}
handler.login(res.osusername, res.ospassword, "", false);
if (!is_port_forward) {
if (is_file_transfer) handler.msgbox("connecting", "Connecting...", "Logging in...");
else msgbox("connecting", "Connecting...", "Logging in...");
}
};
} else if (type.indexOf("session-login") >= 0) {
callback = function (res) {
if (!res) {
view.close();
return;
}
handler.login(res.osusername, res.ospassword, res.password, res.remember);
if (!is_port_forward) {
if (is_file_transfer) handler.msgbox("connecting", "Connecting...", "Logging in...");
else msgbox("connecting", "Connecting...", "Logging in...");
}
};
} else if (type.indexOf("custom") < 0 && !is_port_forward && !callback) {
callback = function() { view.close(); }
} else if (type == 'wait-remote-accept-nook') {
callback = function (res) {
if (!res) {
view.close();
return;
}
};
}
last_msgbox_tag = type + "-" + title + "-" + content + "-" + link;
$(#msgbox).content(<MsgboxComponent width={width} height={height} autoLogin={autoLogin} type={type} title={title} content={content} link={link} remember={remember} callback={callback} contentStyle={contentStyle} hasRetry={hasRetry} />);
}
function connecting() {
handler.msgbox("connecting", "Connecting...", "Connection in progress. Please wait.");
}
handler.msgbox = function(type, title, text, link = "", hasRetry=false) {
// crash somehow (when input wrong password), even with small time, for example, 1ms
self.timer(60ms, function() { msgbox(type, title, text, link, null, 180, 500, hasRetry); });
}
handler.cancel_msgbox = function(tag) {
if (last_msgbox_tag == tag) {
closeMsgbox();
}
}
var reconnectTimeout = 1000;
handler.msgbox_retry = function(type, title, text, link, hasRetry) {
handler.msgbox(type, title, text, link, hasRetry);
if (hasRetry) {
self.timer(0, retryConnect);
self.timer(reconnectTimeout, retryConnect);
reconnectTimeout *= 2;
} else {
reconnectTimeout = 1000;
}
}
function retryConnect(cancelTimer=false) {
if (cancelTimer) self.timer(0, retryConnect);
if (!is_port_forward) connecting();
handler.reconnect(false);
}

function Progress()
{
var _val;
var pos = -0.25;
function step() {
if( _val !== undefined ) { this.refresh(); return false; }
pos += 0.02;
if( pos > 1.25)
pos = -0.25;
this.refresh();
return true;
}
function paintNoValue(gfx)
{
var (w,h) = this.box(#dimension,#inner);
var x = pos * w;
w = w * 0.25;
gfx.fillColor( this.style#color )
.pushLayer(#inner-box)
.rectangle(x,0,w,h)
.popLayer();
return true;
}
this[#value] = property(v) {
get return _val;
set {
_val = undefined;
pos = -0.25;
this.paintContent = paintNoValue;
this.animate(step);
this.refresh();
}
}
this.value = "";
}

            function translate_text(text) {
    if (text.indexOf('Failed') == 0 && text.indexOf(': ') > 0) {
        var fds = text.split(': ');
        for (var i = 0; i < fds.length; ++i) {
            fds[i] = translate(fds[i]);
        }
        text = fds.join(': ');
    } else {
        var fds = text.split(' ');
        if (fds.length > 1 && fds[0].slice(-4) === '_tip') {
            fds[0] = translate(fds[0]);
            var rest = text.substring(fds[0].length + 1);
            text = fds[0] + ' ' + translate(rest);
        } else {
            text = translate(text);
        }
    }
    return text;
}

    function get2faContent() {

            <div>{translate('enter-2fa-title')}</div>
            <div .code><input name='code' type='text' .outline-focus /></div>

    function getInputUserPasswordContent() {
        return <div .form>
            <div>{translate("OS Username")}</div>
            <div .username><input name='osusername' type='text' .outline-focus /></div>
            <div>{translate("OS Password")}</div>
            <PasswordComponent name='ospassword' />
            <div></div>
        </div>;
    }

    function getXsessionPasswordContent() {
        return <div .form>
            <div>{translate("OS Username")}</div>
            <div .username><input name='osusername' type='text' .outline-focus /></div>
            <div>{translate("OS Password")}</div>
            <PasswordComponent name='ospassword' />
            <div>{translate('Please enter your password')}</div>
            <PasswordComponent />
            <div><button|checkbox(remember) {ts}>{translate('Remember password')}</button></div>
        </div>;
    }

    function getContent() {
        if (this.type == "input-password") {
            return this.getInputPasswordContent();
        } else if (this.type == "input-2fa") {
            return this.get2faContent();
        } else if (this.type == "session-login") {
            return this.getInputUserPasswordContent();
        } else if (this.type == "session-login-password") {
            return this.getXsessionPasswordContent();
        } else if (this.type == "custom-os-password") {
            var ts = this.autoLogin ? { checked: true } : {};
            return <div .form>
              <PasswordComponent value={this.content} />
              <div><button|checkbox(autoLogin) {ts} style="width: *; word-wrap: break-word; overflow-wrap: break-word; white-space: normal; height: auto; overflow: hidden;">{translate('Auto Login')}</button></div>
              </div>;
        }
        return this.content;
    }

    function getColor() {
        if (this.type == "input-password" || this.type == "input-2fa" || this.type == "custom-os-password" || this.type == "session-login" || this.type == "session-login-password") {
            return "#AD448E";
        }
        if (this.type == "success") {
            return "#32bea6";
        }
        if (this.type.indexOf("error") >= 0 || this.type == "re-input-password" || this.type == "session-re-login" || this.type == "session-login-re-password") {
            return "#e04f5f";
        }
        return "#2C8CFF";
    }

    function hasSkip() {
        return this.type.indexOf("skip") >= 0;
    }

    function getScreenshotButtons() {
        var isScreenshot = this.type.indexOf("take-screenshot") >= 0;
        return isScreenshot 
            ? <div>
                <button .button #screenshotSaveAs .outline>{translate('Save as')}...</button>
                <button .button #screenshotCopyToClip .outline>{translate('Copy to clipboard')}</button>
                <button .button #screenshotCancel .outline>{translate('Cancel')}</button>
            </div>
            : "";
    }

    function render() {
        this.set_outline_focus();
        var color = this.getColor();
        var icon = this.getIcon(color);
        var content = this.getContent();
        var hasCancel = this.type.indexOf("error") < 0 && this.type.indexOf("nocancel") < 0 && this.type != "restarting";
        var hasOk = this.type != "connecting" && this.type != "success" && this.type.indexOf("nook") < 0;
        var hasLink = this.link != "";
        var hasClose = this.type.indexOf("hasclose") >= 0;
        var show_progress = this.type == "connecting";
        var me = this;
        self.timer(0, msgboxTimerFunc);
        msgboxTimerFunc = function() {
            if (typeof content == "string")
                me.$(#content).html = translate(content);
            else
                me.$(#content).content(content);
        };
        self.timer(3ms, msgboxTimerFunc);
        return (<div><div style="position: absolute; size:*; background:black; opacity:0.5;" />
        <div style="size: *; position: absolute;">
            <div style={"border: " + color + " solid 1px; background: color(bg); margin: *; width:" + (this.width) + "px; min-height:" + (this.height) + "px"}>
            <div .caption style={"background: " + color}>
                {translate(this.title)}
            </div>
            <div style="padding: 1em 2em; size: *;">
                <div style="height: *; flow: horizontal">
                    {icon && <div style="height: *; margin: * 0; padding-right: 2em;" .msgbox-icon>{icon}</div>}
                    <div style={this.contentStyle || "size: *; margin: * 0;"} #content />
                </div>
                <div style="text-align: right;">
                    <span style="display:inline-block; max-width: 250px; font-size:12px;" #error />
                    <progress #progress style={"color:" + color + "; display: " + (show_progress ? "inline-block" : "none")} />
                    {hasCancel || this.hasRetry ? <button .button #cancel .outline>{translate(this.hasRetry ? "OK" : "Cancel")}</button> : ""}
                    {this.hasSkip() ? <button .button #skip .outline>{translate('Skip')}</button> : ""}
                    {hasOk || this.hasRetry ? <button .button #submit>{translate(this.hasRetry ? "Retry" : "OK")}</button> : ""}
                    {hasLink ? <button .button #jumplink .outline>{translate('JumpLink')}</button> : ""}
                    {hasClose ? <button .button #cancel .outline>{translate('Close')}</button> : ""}
                    {this.getScreenshotButtons()}
                </div>
            </div>
            </div>
        </div></div>);
    }

    event click $(.custom-event) (_, me) {
        if (this.callback) this.callback(me);
    }
    
    function submit() {
        var submit_btn = this.$(button#submit);
        if (submit_btn) {
            if (submit_btn.state.disabled) return;
            submit_btn.sendEvent("click");
        }
    }
    
    function cancel() {
        if (this.$(button#cancel)) {
            this.$(button#cancel).sendEvent("click");
        }
    }
 
    event click $(button#cancel) {
        this.close();
        if (this.callback) this.callback(null);
    }
    
    event click $(button#skip) {
        var values = this.getValues();
        values.skip = true;
        if (this.callback) this.callback(values);
        if (this.close) this.close();
    }

    event click $(button#jumplink) {
        if (this.link.indexOf("http") == 0) {
            Sciter.launch(this.link);
        }
    }
    
    event click $(button#submit) {
        if (this.type == "error") {
            if (this.hasRetry) {
                retryConnect(true);
                return;
            }
        }
        if (this.type == "re-input-password") {
            this.type = "input-password";
            this.update();
            return;
        }
        if (this.type == "session-re-login") {
            this.type = "session-login";
            this.update();
            return;
        }
        if (this.type == "session-login-re-password") {
            this.type = "session-login-password";
            this.update();
            return;
        }
        var values = this.getValues();
        if (this.callback) {
            var self = this;
            var err = this.callback(values, function(a=1, b='') { self.show_progress(a, b); });
            if (!err) {
                if (this.close) this.close();
                return;
            }
            if (err && err.trim()) this.show_progress(false, err);
        } else {
            this.close();
        }
    }

    event click $(button#screenshotSaveAs) {
        this.close();

        handler.leave(handler.get_keyboard_mode());
        const filter = "Png file (*.png)";
        const defaultExt = "png";
        const initialPath = System.path(#USER_DOCUMENTS, "screenshot");
        const caption = "Save as";
        var url = view.selectFile(#save, filter, defaultExt, initialPath, caption);
        handler.enter(handler.get_keyboard_mode());
        if(url) {
            var res = handler.handle_screenshot("0:" + URL.toPath(url));
            if (res) {
                msgbox("custom-error-nocancel-nook-hasclose", "Take screenshot", res, "", function() {});
            }
        } else {
            handler.handle_screenshot("2");
        }
    }

    event click $(button#screenshotCopyToClip) {
        this.close();
        var res = handler.handle_screenshot("1");
        if (res) {
            msgbox("custom-error-nocancel-nook-hasclose", "Take screenshot", res, "", function() {});
        }
    }

    event click $(button#screenshotCancel) {
        this.close();
        handler.handle_screenshot("2");
    }
    
    event keydown (evt) {
        if (!evt.shortcutKey) {
            if (isEnterKey(evt)) {
                this.submit();
            }
            if (evt.keyCode == Event.VK_ESCAPE) {
                this.cancel();
            }
        }
    }

    event click $(button#select_directory) {
        var folder = view.selectFolder(translate("Change"), $(#folderPath).text);
        if (folder) {
            if (folder.indexOf("file://") == 0) folder = folder.substring(7);
            $(#folderPath).text = folder;
        }
    }
    
    function show_progress(show=1, err="") {
        if (show == -1) {
            this.close()
            return;
        }
        this.$(#progress).style.set {
            display: show ? "inline-block" : "none"
        };
        this.$(#error).text = err;
    }
    
    function getValues() {
        var values = { type: this.type };
        for (var el in this.$$(.form input)) {
            values[el.attributes["name"]] = el.value;
        }
        for (var el in this.$$(.form textarea)) {
            values[el.attributes["name"]] = el.value;
        }
        for (var el in this.$$(.form button)) {
            values[el.attributes["name"]] = el.value;
        }
        if (this.type == "input-password") {
            values.password = (values.password || "").trim();
            if (!values.password) {
                return;
            }
        }
        if (this.type == "input-2fa") {
            values.code = (values.code || "").trim();
            if (!values.code) {
                return;
            }
        }
        if (this.type == "session-login") {
            values.osusername = (values.osusername || "").trim();
            values.ospassword = (values.ospassword || "").trim();
            if (!values.osusername || !values.ospassword) {
                return;
            }
        }
        if (this.type == "session-login-password") {
            values.password = (values.password || "").trim();
            values.osusername = (values.osusername || "").trim();
            values.ospassword = (values.ospassword || "").trim();
            if (!values.osusername || !values.ospassword || !values.password) {
                return;
            }
        }
        if (this.type == "multiple-sessions-nocancel") {
            values.sid = (this.$$(select))[0].value;
        }
        if (this.type == "remote-printer-selector") {
            values.name = (this.$$(select))[0].value;
        }
        return values;
    }
    
    function set_outline_focus() {
        var me = this;
        self.timer(30ms, function() {
            var el = me.$(.outline-focus);
            if (el) view.focus = el;
            else {
                el = me.$(#submit);
                if (el) {
                    view.focus = el;
                }
            }
        });
    }

    function close() {
        closeMsgbox();
    }
}

var ab = { tags: [], peers: [] };
var abLoading;
var abError;
var current_menu_peer_id = '';
var current_menu_tag = '';

class AddressBook: Reactor.Component
{
    this var style;
    this var selectedTags = function() {
        var tags = handler.get_local_option("selected-tags");
        if (tags) return tags.split(",");
        return [];
    }();
    
    function render() {
        if (!handler.get_local_option("access_token")) {
            return <div style="margin: *"><div #login-link .link style="margin: *; width: 100px; text-align: center; font-size: 1.2em;">{translate("Login")}</div></div>;
        }
        if (abLoading) {

            return <div style="margin: *; text-align: center;">{abError}

            </div>;
        }

                </menu>

                    <li #remove-tag>{translate('Remove')}</li>
                </menu>
            </popup>
            <div .left-pane>
                <div style="padding: 0; padding-bottom: 1em" #tags-label>{translate('Tags')}{svg_menu}</div>
                <div #tags>
                    {ab.tags.map(function(t) {
                        return <span class={me.selectedTags.indexOf(t) >= 0 ? "active" : "inactive"}>{t}</span>;
                    })}
                </div>
            </div>
            <div .right-pane>
                <div .right-content style="padding-top:0; padding-right: 0;">
                    <SessionList sessions={peers} type="ab" />
                </div>
            </div>
        </div>;
    }

    event mouseup $(#tags span) (evt, me) { 
        if(evt.propButton) {
            current_menu_tag = me.text;
            me.popup($(#tag-context));
            return true;
        }
    }
    
    event click $(#retry) (_, __) {
        refreshCurrentUser();
    }

    event click $(#login-link) (_, __) {
        login();
    }

    event click $(#tags-label svg#menu) (_, me) {
        me.popup($(#ab-context));
    }
    
    event click $(#add-id) (_, __) {
        var me = this;
        msgbox(
            "custom-add-id",
            translate("Add ID"),
            <div .form>
            <div>{translate("whitelist_sep")}</div> 
            <textarea .outline-focus spellcheck="false" name="text" style="overflow: scroll-indicator; width:*; height: 160px; font-size: 1.2em; padding: 0.5em;"></textarea>
            </div>,
            "",
            function(res=null) {
                if (!res) return;
                var value = (res.text || "").trim();
                var values = value.split(/[\s,;\n]+/g);
                if (values.length == 0) return;
                for (var v in values) {
                    var found;
                    for (var i = 0; i < ab.peers.length; ++i) {
                        if (ab.peers[i].id == v) {
                            found = true;
                            break;
                        }
                    }
                    if (found) continue;
                    ab.peers.push({ id: v });
                }
                updateAb();
                me.update();
            },
        300);
    }
    
    event click $(#add-tag) (_, __) {
        var me = this;
        msgbox("custom-add-tag", translate("Add Tag"), <div .form>
            <div>{translate("whitelist_sep")}</div> 
            <textarea .outline-focus spellcheck="false" name="text" style="overflow: scroll-indicator; width:*; height: 160px; font-size: 1.2em; padding: 0.5em;"></textarea>
            </div>, "", function(res=null) {
            if (!res) return;
            var value = (res.text || "").trim();
            var values = value.split(/[\s,;\n]+/g);
            if (values.length == 0) return;
            for (var v in values) {
                if (ab.tags.indexOf(v) < 0) {
                    ab.tags.push(v);
                }
            }
            updateAb();
            me.update();
        }, 300);
    }
    
    event click $(#remove-tag) (_, me) {
        var tag = current_menu_tag;
        var i = ab.tags.indexOf(tag);
        ab.tags.splice(i, 1);
        for (var p in ab.peers) {
            if (p.tags) {
                i = p.tags.indexOf(tag);
                if (i >= 0) p.tags.splice(i, 1);
            }
        }
        updateAb();
        this.update();
    }
    
    event click $(#unselect-tags) (_, me) {
        this.selectedTags = [];
        handler.set_local_option("selected-tags", "");
        this.update();
    }

    event click $(#tags span) (_, me) {
        me.attributes.toggleClass('active');
        if (me.attributes.hasClass('active')) {
            this.selectedTags.push(me.text);
        } else {
            this.selectedTags.splice(this.selectedTags.indexOf(me.text), 1);
        }
        handler.set_local_option("selected-tags", this.selectedTags.join(','));
        this.update();
    }

    function getPeers() {
        var tags = [];
        for (var t in this.selectedTags) {
            if (ab.tags.indexOf(t) >= 0) tags.push(t);
        }
        if (tags.length != this.selectedTags.length) {
            this.selectedTags = tags;
            handler.set_local_option("selected-tags", tags.join(","));
            stdout.println("updated selected tags");
        }
        if (tags.length == 0) return ab.peers;
        var peers = [];
        if (tags.length > 0) {
            for (var p in ab.peers) {
                for (var t in (p.tags || [])) {
                    if (tags.indexOf(t) >= 0) {
                        peers.push(p);
                        break;
                    }
                }
            }
        } else {
            peers = ab.peers;
        }
        return peers;
    }
}

class SelectTags: Reactor.Component {

    }

function getSessionsStyleOption(type) {
    return (type || "recent") + "-sessions-style";
}

function getSessionsStyle(type) {
    var v = handler.get_local_option(getSessionsStyleOption(type));
    if (!v) v = type == "ab" ? "list" : "tile";
    return v;
}

var searchPatterns = {};

class SearchBar: Reactor.Component {
    this var type = "";

    function this(params) {
        this.type = (params || {}).type || "";
    }

    function render() {
        var value = searchPatterns[this.type] || "";
        var me = this;
        self.timer(1ms, function() { (me.search_id || {}).value = value; });
        return <div .search-id style="margin-left: 12px">
            <span .search-icon>{search_icon}</span>
            <input|text @{this.search_id} novalue={translate("Search ID")} />
            {value && <span .clear-input>{clear_icon}</span>}
        </div>;
    }

    event click $(span.clear-input) {
        this.onChange('');
    }

    event change $(input) (_, el) {
        this.onChange(el.value.trim().toLowerCase());
    }
    
    function onChange(v) {
        searchPatterns[this.type] = v;
        app.multipleSessions.update();
    }
}

class SessionStyle: Reactor.Component {
    this var type = ""; 

    function this(params) {
        this.type = (params || {}).type || "";
    }

    function render() {
        var sessionsStyle = getSessionsStyle(this.type);
        return <div .sessions-tab style="margin-left: 0.5em;">
                <span class={sessionsStyle == "tile" ? "active" : "inactive"}>{svg_tile}</span>
                <span class={sessionsStyle != "tile" ? "active" : "inactive"}>{svg_list}</span>
            </div>;
    }

    event click $(span.inactive) {
        var option = getSessionsStyleOption(this.type);
        var sessionsStyle = getSessionsStyle(this.type);
        handler.set_local_option(option, sessionsStyle == "tile" ? "list" : "tile");
        if (is_linux) {
            app.multipleSessions.stupidUpdate();
        } else {
            app.multipleSessions.update();
        }
    }
}

class SessionList: Reactor.Component {
    this var sessions = [];
    this var type = "";
    this var style;
    
    function this(params) {
        this.sessions = params.sessions;
        this.type = params.type || "";
        this.style = getSessionsStyle(this.type);
    }

    function getSessions() {
        var p = searchPatterns[this.type];
        if (!p) return this.sessions;
        var tmp = [];
        this.sessions.map(function(s) {
            var name = (s[4] || s.alias || "").toLowerCase();
            var id = (s[0] || s.id || "").toLowerCase();
            var user = (s[1] || "").toLowerCase();
            var hostname = (s[2] || "").toLowerCase();
            if (name.indexOf(p) >= 0 || id.indexOf(p) >= 0 || user.indexOf(p) >= 0 || hostname.indexOf(p) >= 0) {
                tmp.push(s);
            }
        });
        return tmp;
    }

    function render() {
        var sessions = this.getSessions();
        if (sessions.length == 0) {
            return <div style="margin: *; font-size: 1.6em; width: 100px; text-align: center;">{translate("Empty")}</div>;
        }
        var me = this;
        sessions = sessions.map(function(x) { return me.getSession(x); });
        return <div .recent-sessions-content key={sessions.length}>
            <popup>
                <menu.context #remote-context>
                    <li #connect>{translate('Connect')}</li>
                    <li #transfer>{translate('Transfer file')}</li>
                    <li #tunnel>{translate('TCP tunneling')}</li>
                    <li #force-always-relay><span>{svg_checkmark}</span>{translate('Always connect via relay')}</li>
                    <li #rdp>RDP<EditRdpPort /></li>
                    <li #wol>{translate('WOL')}</li>
                    <div .separator />
                    {this.type != "lan" && <li #rename>{translate('Rename')}</li>}
                    {this.type != "fav" && <li #remove>{translate('Remove')}</li>}
                    {is_win && <li #shortcut>{translate('Create desktop shortcut')}</li>}
                    <li #forget-password>{translate('Forget Password')}</li>
                    {(!this.type || this.type == "fav") && <li #add-fav>{translate('Add to Favorites')}</li>}
                    {(!this.type || this.type == "fav") && <li #remove-fav>{translate('Remove from Favorites')}</li>}
                    {this.type == "ab" && <li #edit-tag>{translate('Edit Tag')}</li>}
                </menu>
            </popup>
            {sessions}
        </div>;
    }

    function getSession(s) {
        var id = s[0] || s.id || "";
        var username = s[1] || s.username || "";
        var hostname = s[2] || s.hostname || "";
        var platform = s[3] || s.platform || "";
        var alias = s[4] || s.alias || "";
        if (this.style == "list") {
            return <div .remote-session-link .remote-session-list id={id} platform={platform} title={alias ? "ID: " + id : ""}>
                <div .platform style={"background:"+string2RGB(id+platform, 0.5)}>
                    {platform && platformSvg(platform, "white")}
                </div>
                <div .name>
                    <div>
                        <div #alias .ellipsis>{alias ? alias : formatId(id)}</div>
                        <div .username .ellipsis>{username}@{hostname}</div>
                    </div>
                </div>
                <div>
                    {svg_menu}
                </div>
            </div>;
        }
        return <div .remote-session-link .remote-session id={id} platform={platform} title={alias ? "ID: " + id : ""} style={"background:"+string2RGB(id+platform, 0.5)}>
            <div .platform>
                {platform && platformSvg(platform, "white")}
                <div .username .ellipsis>{username}@{hostname}</div>
            </div>
            <div .text>
                <div #alias .ellipsis>{alias ? alias : formatId(id)}</div>
                {svg_menu}
            </div>
        </div>;
    }

    event dblclick $(div.remote-session-link) (evt, me) {
        createNewConnect(me.id, "connect");
    }
    
    event click $(#menu) (_, me) {
        var id = me.parent.parent.id;
        var platform = me.parent.parent.attributes["platform"];
        this.$(#rdp).style.set{
            display: (platform == "Windows" && is_win) ? "block" : "none",
        };
        this.$(#forget-password).style.set{
            display: handler.peer_has_password(id) ? "block" : "none",
        };
        if (!this.type || this.type == "fav") {
            var in_fav = handler.get_fav().indexOf(id) >= 0;
            this.$(#add-fav).style.set{
                display: in_fav ? "none" : "block",
            };
            this.$(#remove-fav).style.set{
                display: in_fav ? "block" : "none",
            };
        }
        // https://sciter.com/forums/topic/replacecustomize-context-menu/
        var menu = this.$(menu#remote-context);
        current_menu_peer_id = id;
        var el = this.$(li#force-always-relay);
        if (el) {
          var force = handler.get_peer_option(id, "force-always-relay");
          el.attributes.toggleClass("selected", force == "Y");
        }
        var conn = this.$(menu #connect);
        if (conn) {
          var alias = me.parent.parent.$(#alias);
          if (alias) {
            alias = alias.text.replace(' ', '');
            if (alias != id) {
              conn.text = translate('Connect') + ' ' + id;
            } else {
              conn.text = translate('Connect');
            }
          }
        }
        me.popup(menu);
    }

    event click $(menu#remote-context li) (evt, me) {
        var action = me.id;
        var id = current_menu_peer_id;
        if (action == "connect") {
            createNewConnect(id, "connect");
        } else if (action == "transfer") {
            createNewConnect(id, "file-transfer");
        } else if (action == "wol") {
            handler.send_wol(id);
        } else if (action == "remove") {
            if (this.type == "ab") {
                for (var i = 0; i < ab.peers.length; ++i) {
                    if (ab.peers[i].id == id) {
                        ab.peers.splice(i, 1);
                        app.update();
                        updateAb();
                        break;
                    }
                }
            } else if (this.type == "lan") {
                handler.remove_discovered(id);
                app.update();
            } else {
                handler.remove_peer(id);
                app.update();
            }
        } else if (action == "forget-password") {
            handler.forget_password(id);
        } else if (action == "shortcut") {
            handler.create_shortcut(id);
        } else if (action == "rdp") {
            if (is_edit_rdp_port) {
                is_edit_rdp_port = false;
                return;
            }
            createNewConnect(id, "rdp");
        } else if (action == "add-fav") {
            var favs = handler.get_fav();
            if (favs.indexOf(id) < 0) {
                favs = [id].concat(favs);
                handler.store_fav(favs);
            }
            app.multipleSessions.update();
            app.update();
        } else if (action == "remove-fav") {
            var favs = handler.get_fav();
            var i = favs.indexOf(id);
            favs.splice(i, 1);
            handler.store_fav(favs);
            app.multipleSessions.update();
        } else if (action == "tunnel") {
            createNewConnect(id, "port-forward");
        } else if (action == "rename") {
            var old_name = handler.get_peer_option(id, "alias");
            var abPeer;
            if (this.type == "ab") {
                for (var v in ab.peers) {
                    if (v.id == id) {
                        abPeer = v;
                        old_name = v.alias || "";
                    }
                }
            }
            msgbox("custom-rename", "Rename", "<div .form> \
                <div><input|text name='name' .outline-focus style='width: *; height: 23px', value='" + old_name + "' /></div> \
                </div> \
                ", "", function(res=null) {
                    if (!res) return;
                    var name = (res.name || "").trim();
                    if (name != old_name) {
                        if (abPeer) {
                            abPeer.alias = name;
                            updateAb();
                        }
                        handler.set_peer_option(id, "alias", name);
                    }
                    app.update();
                });
        } else if (action == "force-always-relay") {
            var force = handler.get_peer_option(id, "force-always-relay");
            handler.set_peer_option(id, "force-always-relay", force == "Y" ? "" : "Y");
        } else if (action == "edit-tag") {
            var peer;
            for (var v in ab.peers) {
                if (v.id == id) {
                    peer = v;
                }
            }
            if (!peer) return;
            msgbox("custom-edit-tag", "Edit Tag", <SelectTags tags={peer.tags || []} />, "", function(res=null) {
                    if (!res) return;
                    peer.tags = selectTags.tags;
                    updateAb();
                }, 260, 500, 0, "size: *; margin: 2em 0;");
        }
    }
}

function getSessionsType() {
    return handler.get_local_option("show-sessions-type");
}

class Favorites: Reactor.Component {
    function render() {
        var sessions = handler.get_fav().map(function(f) {
            return handler.get_peer(f);
        });
        return <SessionList sessions={sessions} type="fav" />;
    }
}

class MultipleSessions: Reactor.Component {
    function render() {
        var type = getSessionsType();
        return  <div style="size: *">
                <div .sessions-bar>
                    <div style="width:*" .sessions-tab #sessions-type>
                        <span class={!type ? 'active' : 'inactive'}>{translate('Recent sessions')}</span>
                        <span #fav class={type == "fav" ? 'active' : 'inactive'}>{translate('Favorites')}</span>
                        {handler.is_installed() && <span #lan class={type == "lan" ? 'active' : 'inactive'}>{translate('Discovered')}</span>}
                        {!disable_account && !disable_ab && <span #ab class={type == "ab" ? 'active' : 'inactive'}>{translate('Address book')}</span>}
                    </div>
                    {!this.hidden && !(disable_account && type == "ab") && <SearchBar type={type} />}
                    {!this.hidden && !(disable_account && type == "ab") && <SessionStyle type={type} />}
                </div>
                {!this.hidden && 
                ((type == "fav" && <Favorites />) ||
                (type == "lan" && handler.is_installed() && <LanPeers />) ||
                (type == "ab" && !disable_account && !disable_ab && <AddressBook />) ||
                <SessionList sessions={handler.get_recent_sessions()} />)}
            </div>;
    }

    function stupidUpdate() {
        /* hidden is workaround of stupid sciter bug */
        this.hidden = true;
        this.update();
        var me = this;
        self.timer(60ms, function() {
            me.hidden = false;
            me.update();
	    self.timer(30ms, function() { me.onSize(); });
        });
    }

    event click $(div#sessions-type span.inactive) (_, el) {
        if (el.id == "lan") {
            discover();
        }
        handler.set_local_option('show-sessions-type', el.id || "");
        this.stupidUpdate();
    }

    function onSize() {
        var w = this.$(.sessions-bar .sessions-tab).box(#width);
        var len = translate('Recent sessions').length;
        var totalChars = 0;
        var nEle = 0;
        for (var el in this.$$(#sessions-type span)) {
            nEle += 1;
            totalChars += el.text.length;
        }
        for (var el in this.$$(#sessions-type span)) {
            var maxWidth = (w - nEle * 2 * 8) * el.text.length / totalChars;
            if (maxWidth < 0) maxWidth = 36;
            el.style.set{
                "max-width": maxWidth + "px",
            };
        }
    }
}

function discover() {
    handler.discover();
    var tries = 15;
    function update() {
        self.timer(300ms, function() {
            tries -= 1;
            if (tries == 0) return;
            update();
            var p = (app || {}).multipleSessions;
            if (p) {
                p.update();
            }
        });
    }
    update();
}

if (getSessionsType() == "lan" && handler.is_installed()) {
    discover();
}

class LanPeers: Reactor.Component {
    function render() {
        var sessions = [];
        try {
            sessions = JSON.parse(handler.get_lan_peers());
        } catch (_) {}
        return <SessionList sessions={sessions} type="lan" />;
    }
}

view.on("size", function() { if (app && app.multipleSessions) app.multipleSessions.onSize(); });

/*
{
    peers: [{id: "abcd", username: "", hostname: "", platform: "", alias: "", tags: ["", "", ...]}, ...],
    tags: [],
}
*/

function handleAbError(err) {
    abLoading = false;
    err = translate(err);
    stderr.println(err);
    abError = err;
    app.update();
}

function getAb() {
    abLoading = true;
    abError = "";
    app.update();
    httpRequest(handler.get_api_server() + "/api/ab/get", #post, {}, function(data) {
        if (data) {
            if (data.error) {
                handleAbError(data.error);
                return;
            }
            var tm = data.updated_at;
            ab = JSON.parse(data.data);
            if (!ab.tags) ab.tags = [];
            if (!ab.peers) ab.peers = [];
        }
        abLoading = false;
        app.update();
    }, function(err, status) {
        handleAbError(err);
    }, getHttpHeaders());
}

function updateAb() {
    httpRequest(handler.get_api_server() + "/api/ab", #post, { data: JSON.stringify(ab) }, function(data) {
    }, function(err, status) {
    }, getHttpHeaders());
}

function resetAb() {
    ab = { tags: [], peers: [] };
    app.update();
}

function updateAbPeer() {
    if (ab.peers.length == 0) return;
    // to-do: inefficient
    var sessions = handler.get_recent_sessions();
    if (sessions.length == 0) return;
    var s = sessions[0];
    var id = s[0] || "";
    var p;
    for (var tmp in ab.peers) {
        if (tmp.id == id) p = tmp;
    }
    if (!p) return;
    var username = s[1] || "";
    var hostname = s[2] || "";
    var platform = s[3] || "";
    var alias = s[4] || "";
    var updated;
    if (username != (p.username || "")) {
        p.username = username;
        updated = true;
    }
    if (hostname != (p.hostname || "")) {
        p.hostname = hostname;
        updated = true;
    }
    if (platform != (p.platform || "")) {
        p.platform = platform;
        updated = true;
    }
    if (alias != (p.alias || "")) {
        if (alias) {
            p.alias = alias;
        } else if (p.alias) {
            handler.set_peer_option(id, "alias", p.alias);
        }
        updated = true;
    }
    if (updated) {
        updateAb();
        stdout.println("Ab peer updated");
    }
}

function open_custom_server_dialog() {
    var configOptions = handler.get_options();
    var old_relay = configOptions["relay-server"] || "";
    var old_api = configOptions["api-server"] || "";
    var old_id = configOptions["custom-rendezvous-server"] || "";
    var old_key = configOptions["key"] || "";
    msgbox("custom-server", "ID/Relay Server", "<div .form .set-password> \
            <div><span>" + translate("ID Server") + ": </span><input|text .outline-focus name='id' value='" + old_id + "' /></div> \
            <div><span>" + translate("Relay Server") + ": </span><input|text name='relay' value='" + old_relay + "' /></div> \
            <div><span>" + translate("API Server") + ": </span><input|text name='api' value='" + old_api + "' /></div> \
            <div><span>" + translate("Key") + ": </span><input|text name='key' value='" + old_key + "' /></div> \
            </div> \
            ", "", function(res=null, show_progress) {
                if (!res) return;
                if (typeof show_progress === 'function') show_progress();
                var id = (res.id || "").trim();
                var relay = (res.relay || "").trim();
                var api = (res.api || "").trim().toLowerCase();
                var key = (res.key || "").trim();
                if (id == old_id && relay == old_relay && key == old_key && api == old_api) return;
                if (id) {
                    var err = handler.test_if_valid_server(id, true);
                    if (err) { if (typeof show_progress === 'function') show_progress(false, translate("ID Server") + ": " + err); return; }
                }
                if (relay) {
                    var err = handler.test_if_valid_server(relay, true);
                    if (err) { if (typeof show_progress === 'function') show_progress(false, translate("Relay Server") + ": " + err); return; }
                }
                if (api) {
                    if (0 != api.indexOf("https://") && 0 != api.indexOf("http://")) {
                        if (typeof show_progress === 'function') show_progress(false, translate("API Server") + ": " + translate("invalid_http"));
                        return;
                    }
                }
                configOptions["custom-rendezvous-server"] = id;
                configOptions["relay-server"] = relay;
                configOptions["api-server"] = api;
                configOptions["key"] = key;
                handler.set_options(configOptions);
                if (typeof show_progress === 'function') show_progress(-1);
            }, 260, get_msgbox_width());

    var readonly_attr = is_opt_fixed ? " readonly=\"readonly\"" : "";
    var grey_class = is_opt_fixed ? " class=\"grey-text\"" : "";

            <div" + grey_class + ">" + translate("whitelist_sep") + "</div> \
            <textarea .outline-focus spellcheck=\"false\" name=\"text\" novalue=\"0.0.0.0\"" + readonly_attr + grey_class + " style=\"overflow: scroll-indicator; width:*; height: 140px; font-size: 1.2em; padding: 0.5em;\">" + old_value + "</textarea>\
            </div> \
            ", "", function(res=null, show_progress) {
                if (!res) return;
                if (typeof show_progress === 'function') show_progress();
                var value = (res.text || "").trim();
                if (value) {
                    var values = value.split(/[\s,;\n]+/g);
                    for (var ip in values) {
                        if (!ip.match(/^(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]?|0)\.(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]?|0)\.(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]?|0)\.(25[0-5]|2[0-4][0-9]|1[0-9][0-9]|[1-9][0-9]?|0)(\/([1-9]|[1-2][0-9]|3[0-2])){0,1}$/)
                            && !ip.match(/^(((?:[0-9A-Fa-f]{1,4}))*((?::[0-9A-Fa-f]{1,4}))*::((?:[0-9A-Fa-f]{1,4}))*((?::[0-9A-Fa-f]{1,4}))*|((?:[0-9A-Fa-f]{1,4}))((?::[0-9A-Fa-f]{1,4})){7})(\/([1-9]|[1-9][0-9]|1[0-1][0-9]|12[0-8])){0,1}$/)) {
                            if (typeof show_progress === 'function') show_progress(false, translate("Invalid IP") + ": " + ip);
                            return;
                        }
                    }
                    value = values.join("\n");
                }
                if (value == old_value) return;
                if (!value) value = default_option_whitelist;

            , "", function(res=null, show_progress) {
                if (!res) return;
                if (typeof show_progress === 'function') show_progress();
                var proxy = (res.proxy || "").trim();
                var username = (res.username || "").trim();
                var password = (res.password || "").trim();
                if (proxy == old_proxy && username == old_username && password == old_password) return;
                if (proxy) {
                    var domain_port = proxy;
                    var protocol_index = domain_port.indexOf('://');
                    if (protocol_index !== -1) {
                        domain_port = domain_port.substring(protocol_index + 3);
                    }
                    var err = handler.test_if_valid_server(domain_port, false);
                    if (err) { if (typeof show_progress === 'function') show_progress(false, translate("Server") + ": " + err); return; }
                }
                handler.set_socks(proxy, username, password);
                if (typeof show_progress === 'function') show_progress(-1);
            }, 240, get_msgbox_width());
}

    function toggleMenuState() {
        for (var el in $$(menu#config-options>li)) {
            var id = el.id;
            if (!id) continue;
            var is_opt_fixed = handler.is_option_fixed(id);
            if (id.indexOf("enable-") == 0) {
                var enabled = handler.get_option(id) != "N";
                el.attributes.toggleClass("selected", enabled);
                el.attributes.toggleClass("line-through", !enabled);
            } else if (id.indexOf("allow-") == 0) {
                var enabled = handler.get_option(id) == "Y";
                el.attributes.toggleClass("selected", enabled);
                el.attributes.toggleClass("line-through", !enabled);
            } else if (id == "whitelist") {
                continue;
            }
            if (is_opt_fixed) {
                el.state.disabled = true;
            }

    function showAbout() {
        var name = handler.get_app_name();
        msgbox("custom-nocancel-nook-hasclose", translate("About") + " " + name, "<div style='line-height: 2em'> \
            <div>Version: " + handler.get_version() + " \
            <div>Fingerprint: " + handler.get_fingerprint() + " \
            <div .link .custom-event url='https://rustdesk.com/privacy.html'>" + translate("Privacy Statement") + "</div> \
            <div .link .custom-event url='https://rustdesk.com'>" + translate("Website") + "</div> \
	    <div style='background: #2c8cff; color: white; padding: 1em; margin-top: 1em;'>Copyright &copy; 2025 Purslane Ltd.\
            <br />" + handler.get_license() + " \
            <p style='font-weight: bold'>" + translate("Slogan_tip") + "</p>\
            </div>\
        </div>", "", function(el) {
            if (el && el.attributes) {
                handler.open_url(el.attributes['url']);
            };
        }, 400, get_msgbox_width());
    }

    event click $(menu#config-options>li) (_, me) {
        if (me.state.disabled) return;
        if (me.id && me.id.indexOf("enable-") == 0) {
            handler.set_option(me.id, handler.get_option(me.id) == "N" ? default_option_yes : "N");
        }
        if (me.id && me.id.indexOf("allow-") == 0) {
            handler.set_option(me.id, handler.get_option(me.id) == "Y" ? default_option_no : "Y");
        }
        if (me.id == "whitelist") {
            open_whitelist_dialog();
        } else if (me.id == "custom-server") {
            open_custom_server_dialog();
        } else if (me.id == "socks5-server") {
            open_proxy_dialog();
        } else if (me.id == "disable-udp") {
            handler.set_option("disable-udp", handler.get_option("disable-udp") == "Y" ? "N" : "Y");
        } else if (me.id == "stop-service") {
            handler.set_option("stop-service", service_stopped ? default_option_no : "Y");
        } else if (me.id == "change-id") {
            var id_label_width = incoming_only ? "50px" : "100px";
            var input_width = incoming_only ? (incoming_only_width - 20) + "px" : "250px";
            msgbox("custom-id", translate("Change ID"), "<div .form .set-password> \
            <div>" + translate('id_change_tip') + " </div> \
            <div><span style='width: " + id_label_width + "; display:inline-block'>ID: </span><input|text .outline-focus style='width: " + input_width + "' name='id' /></div> \
            </div> \
            ", "", function(res=null, show_progress) {
                if (!res) return;
                show_progress();
                var id = (res.id || "").trim();
                if (!id) return;
                if (id == my_id) return;
                handler.change_id(id);
                function check_status() {
                    var status = handler.get_async_job_status();
                    if (status == " ") self.timer(0.1s, check_status);
                    else {
                        if (status) show_progress(false, translate(status));
                        else show_progress(-1);
                    }
                }
                check_status();
                return " ";
            }, msgbox_default_height, get_msgbox_width());
        } else if (me.id == "allow-darktheme") {
            updateTheme();
        } else if (me.id == "about") {
            this.showAbout()
        }
    }
}

class App: Reactor.Component
{
    function this() {
        app = this;
        this.cctv_cell_size = 300;
        this.is_logged_in = false;
        this.login_id = "";
        this.login_error = "";
    }

    event click $(button#btn-login) () {
        try {
            var id = (this.login_id || "").toString().replace(/\s/g, "");
            if (!id) {
                this.login_error = "";
                this.update();
                msgbox("custom-error", "Input Required", "Please enter a valid User ID.");
                return;
            }
            
            var app = this;
            app.login_error = "Connecting to server...";
            app.update();
            
            app.timer(20ms, function() {
                try {
                    var resp = handler.auth_login(id);
                    if (resp == "OK") {
                        app.is_logged_in = true;
                        app.update();
                        
                        var r = app.saved_window_size;
                        if (r && isReasonableSize(r) && r[2] > 0 && !(r[2] == scaleIt(360) && r[3] == scaleIt(460))) {
                            var (sx, sy, sw, sh) = view.screenBox(#workarea, #rectw);
                            if (r[2] >= sw && r[3] >= sh) {
                                self.timer(1ms, function() { view.windowState = View.WINDOW_MAXIMIZED; });
                            } else {
                                view.move(r[0], r[1], incoming_only ? scaleIt(incoming_only_width) : r[2], r[3]);
                            }
                        } else {
                            centerize(scaleIt(incoming_only ? incoming_only_width : 800), scaleIt(incoming_only ? 390 : 600));
                        }
                    } else {
                        app.login_error = "";
                        app.update();
                        msgbox("custom-error", "Authentication Failed", resp || "Undefined response");
                    }
                } catch (e) {
                    app.login_error = "";
                    app.update();
                    msgbox("custom-error", "Error", "TIS Exception: " + e.toString());
                }
            });
        } catch (global_err) {
            msgbox("custom-error", "Error", "Outer Exception: " + global_err.toString());
        }
    }

    event change $(input#login-id) (evt, el) {
        this.login_id = el.value;
    }

    function on_login_success() {
        // called from rust if we do async, but we made it sync so this is just in case
        this.is_logged_in = true;
        this.update();

        var id = (this.remote_id.value || "").replace(/\s/g, "");
        if (!id) return;
        id = handler.handle_relay_id(id);
        if (id == my_id) {
            msgbox("custom-error", "Error", "You cannot add your own computer");
            return;
        }
        // Create a PeerConfig entry on disk (with platform info) so it shows in recent sessions
        handler.add_peer(id);
        // Force UI refresh
        this.update();
    }

    event click $(button#connect) {
        this.newRemote("connect");
    }

    event click $(button#file-transfer) {
        this.newRemote("file-transfer");
    }

    event click $(button#cctv-connect) {
        var sessions = handler.get_recent_sessions();
        if (!sessions || sessions.length == 0) {
            msgbox("custom-error", "CCTV", translate("Empty"));
            return;
        }
        
        var total = sessions.length < 16 ? sessions.length : 16;
        handler.close_all_cctv();
        this.cctv_sessions = [];
        handler.clear_cctv_queue();
        for (var i = 0; i < total; ++i) {
            this.cctv_sessions.push(sessions[i]);
            handler.push_cctv_peer(sessions[i][0]);
        }
        
        this.show_cctv = true;
        this.update();
    }

    event click $(button#cctv-close) {
        handler.close_all_cctv();
        this.cctv_sessions = [];
        this.show_cctv = false;
        this.update();
    }



    event click $(button#cctv-reboot-all) {
        var videos = this.$$(video);
        if (!videos || videos.length == 0) {
            msgbox("custom-error", "재부팅", "연결된 컴퓨터가 없습니다.");
            return;
        }
        msgbox("restart-confirmation", "모든 컴퓨터 재부팅", "정말 모든 컴퓨터를 재부팅하시겠습니까?", "", function(res=null) {
            if (res != null) {
                for (var v in videos) {
                    if (v.restart_remote_device) {
                        v.restart_remote_device();
                    }
                }
            }
        });
    }

    event change $(input#cctv-size-slider) (evt) {
        var v = evt.target.value.toInteger();
        if (v < 50) v = 50;
        if (v > 800) v = 800;
        this.cctv_cell_size = v;
        app.cctv_cell_size = v;
        var lbl = $(span#cctv-size-label);
        if (lbl) lbl.text = v.toString() + "px";
        updateCctvLayout();
    }

    event click $(.cctv-cell) (evt) {
        if (!evt.mainButton) return;
        var cell = evt.target;
        if (cell && !cell.attributes.hasClass("cctv-cell")) {
            cell = cell.parent;
        }
        if (!cell || !cell.attributes.hasClass("cctv-cell")) return;
        var clicked_idx = cell.attributes["index"].toInteger();
        
        if (this.selected_cctv_index === undefined || this.selected_cctv_index === null) {
            this.selected_cctv_index = clicked_idx;
            cell.attributes.addClass("selected");
        } else {
            var idx1 = this.selected_cctv_index;
            var idx2 = clicked_idx;
            
            if (idx1 != idx2) {
                var prev_cell = $(.cctv-cell.selected);
                if (prev_cell) prev_cell.attributes.removeClass("selected");
                
                this.selected_cctv_index = clicked_idx;
                cell.attributes.addClass("selected");
            } else {
                this.selected_cctv_index = null;
                cell.attributes.removeClass("selected");
            }
        }
    }

    event dblclick $(.cctv-cell) (evt) {
        if (!evt.mainButton) return;
        var prev_cell = $(.cctv-cell.selected);
        if (prev_cell) prev_cell.attributes.removeClass("selected");
        this.selected_cctv_index = null;
        
        var cell = evt.target;
        if (cell && !cell.attributes.hasClass("cctv-cell")) {
            cell = cell.parent;
        }
        if (!cell || !cell.attributes.hasClass("cctv-cell")) return;
        if (cell.attributes.hasClass("empty")) return;
        var peer_id = cell.attributes["id"].replace("cctv-cell-", "");
        createNewConnect(peer_id, "connect");
    }

    event mouseup $(.cctv-cell) (evt) {
        if (!evt.propButton) return false;
        var cell = evt.target;
        if (cell && !cell.attributes.hasClass("cctv-cell")) {
            cell = cell.parent;
        }
        if (!cell || !cell.attributes.hasClass("cctv-cell")) return false;
        if (cell.attributes.hasClass("empty")) return false;
        
        var video = cell.$(video);
        if (!video) return false;
        
        var menu = $(menu#cctv-index-context-menu);
        if (!menu) {
            $(body).append(<popup><menu.context id="cctv-index-context-menu">
                <li id="cctv-index-reboot">{translate('Restart remote device')} (재부팅)</li>
                <li id="cctv-index-file-transfer">파일전송</li>
            </menu></popup>);
            menu = $(menu#cctv-index-context-menu);
            
            $(body).on("click", "li#cctv-index-reboot", function(e) {
                var v = menu.video_target;
                if (v) {
                    msgbox(
                        "restart-confirmation",
                        translate("Restart remote device") + " (재부팅)",
                        translate("Are you sure you want to restart") + " ?",
                        "",
                        function(res=null) {
                            if (res != null) {
                                v.restart_remote_device();
                            }
                        }
                    );
                }
            });
            $(body).on("click", "li#cctv-index-file-transfer", function(e) {
                var v = menu.video_target;
                if (v && menu.peer_id) {
                    handler.new_remote(menu.peer_id, "file-transfer", false);
                }
            });
        }
        menu.video_target = video;
        menu.peer_id = cell.attributes["id"].replace("cctv-cell-", "");
        cell.popup(menu);
        return true;
    }

    function newRemote(type) {
        createNewConnect(this.remote_id.value, type);
    }
}

function download(from, to, args..) {
    var rqp = { type:#get, url: from, toFile: to };
    var fn = 0;
    var on = 0;
    for( var p in args ) {
        if( p instanceof Function ) {
            switch(++fn) {
                case 1: rqp.success = p; break;
                case 2: rqp.error = p; break;
                case 3: rqp.progress = p; break;
            }
        } else if( p instanceof Object ) {
            switch(++on) {
                case 1: rqp.params = p; break;
                case 2: rqp.headers = p; break;
            }
        }  
    }
    view.request(rqp);
}

var password_cache = ["","","",""];
function updatePasswordArea() {
    self.timer(1s, function() {
        var temporary_password = handler.temporary_password();
        var verification_method = handler.get_option('verification-method');
        var temporary_password_length = handler.get_option('temporary-password-length');
        var approve_mode = handler.get_option('approve-mode');
        var update = false;
        if (password_cache[0] != temporary_password) {
            password_cache[0] = temporary_password;
            update = true;
        }
        if (password_cache[1] != verification_method) {
            password_cache[1] = verification_method;
            update = true;
        }
        if (password_cache[2] != temporary_password_length) {
            password_cache[2] = temporary_password_length;
            update = true;
        }
        if (password_cache[3] != approve_mode) {
            password_cache[3] = approve_mode;
            update = true;
        }
        if (update && passwordArea) passwordArea.update();
        updatePasswordArea();
    });                          
}
if (!outgoing_only) updatePasswordArea();

function updateSetPasswordSubmitState() {
    var dialog = $(#msgbox);
    if (!dialog) return;
    var password = dialog.$(input[name='password']);
    var confirmation = dialog.$(input[name='confirmation']);
    var submit = dialog.$(button#submit);
    if (!password || !confirmation || !submit) return;
    var can_submit = (password.value || "").trim().length > 0 ||
        (confirmation.value || "").trim().length > 0;
    submit.state.disabled = !can_submit;
}

class ID: Reactor.Component {
    function render() {
        return <input type="text" #remote_id .outline-focus novalue={translate("Enter Remote ID")}
        value={formatId(handler.get_remote_id())} />;
    }

    // https://github.com/c-smile/sciter-sdk/blob/master/doc/content/sciter/Event.htm
    event change {
        var fid = formatId(this.value);
        var d = this.value.length - (this.old_value || "").length;
        this.old_value = this.value;
        var start = this.xcall(#selectionStart) || 0;
        var end = this.xcall(#selectionEnd);
        if (fid == this.value || d <= 0 || start != end) {
            return;
        }
        // fix Caret position
        this.value = fid;
        var text_after_caret = this.old_value.substr(start);
        var n = fid.length - formatId(text_after_caret).length;
        this.xcall(#setSelection, n, n);
    }
}

var reg = /^\d+$/;
function formatId(id) {
    id = id.replace(/\s/g, "");
    if (reg.test(id) && id.length > 3) {
        var n = id.length;
        var a = n % 3 || 3;
        var new_id = id.substr(0, a);
        for (var i = a; i < n; i += 3) {
            new_id += " " + id.substr(i, 3);
        }
        return new_id;
    }
    return id;
}

function checkConnectStatus() {
    handler.check_mouse_time(); // trigger connection status updater
    self.timer(1s, function() {
        var tmp = false;
        if (tmp != service_stopped) {
            service_stopped = tmp;
            app.update();
        }
        tmp = handler.using_public_server();
        if (tmp != using_public_server) {
            using_public_server = tmp;
            if (app && app.connect_status) app.connect_status.update();
        }
        tmp = handler.get_connect_status();
        if (tmp[0] != connect_status) {
            connect_status = tmp[0];
            if (app && app.connect_status) app.connect_status.update();
            if (myIdMenu) myIdMenu.update();
        }
        if (tmp[1] != key_confirmed) {
            key_confirmed = tmp[1];
            app.update();
        }
        if (tmp[2] && tmp[2] != my_id) {
            stdout.println("id updated");
            app.update();
        }
        tmp = handler.get_error();
        if (system_error != tmp) {
            system_error = tmp;
            app.update();
        }
        tmp = handler.get_software_update_url();
        if (tmp != software_update_url) {
            software_update_url = tmp;
            app.update();
        }
        if (handler.recent_sessions_updated()) {
            stdout.println("recent sessions updated");
            updateAbPeer();
            app.update();
        }
        tmp = handler.get_option("disable-udp") == "Y";
        if (tmp != disable_udp) {
            disable_udp = tmp;
            app.update();
        }
        check_if_overlay();
        checkConnectStatus();    
    });                          
}                                
                                 
var enter = false;               
function self.onMouse(evt) {     
    switch(evt.type) {           
    case Event.MOUSE_ENTER:    
        enter = true;
        check_if_overlay();
        break;
    case Event.MOUSE_LEAVE:
        var el_overlay = self.select('#overlay');
        if (el_overlay) {
            el_overlay.style#display = 'none';
        }
        enter = false;
        break;
    }
}

function check_if_overlay() {
    var enabled;
    var is_enabled_by_control_permissions = handler.is_remote_modify_enabled_by_control_permissions();
    if (is_enabled_by_control_permissions == "true") {
        enabled = true;
    } else if (is_enabled_by_control_permissions == "false") {
        enabled = false;
    } else {
        enabled = handler.get_option('allow-remote-config-modification') == 'Y';
    }
    if (!enabled) {
        var time0 = getTime();
        handler.check_mouse_time();
        self.timer(120ms, function() {
            if (!enter) return;
            var d = time0 - handler.get_mouse_time();
            var el_overlay = self.select('#overlay');
            if (el_overlay && d < 120) {
                el_overlay.style#display = 'block';
            }
        });
    }
}

function login() {
    var name0 = getUserName();
    var pass0 = '';
    msgbox("custom-login", translate('Login'), <div .form .set-password> 
            <div><span>{translate('Username')}:</span><input|text name="username" value={name0} .outline-focus /></div> 
            <div><span>{translate('Password')}:</span><PasswordComponent value={pass0} /></div> 
        </div>, "", function(res=null, show_progress) {
        if (!res) return;
        show_progress();
        var name = (res.username || '').trim();
        if (!name) {
            show_progress(false, translate("Username missed"));
            return " ";
        }
        var pass = (res.password || '').trim();
        if (!pass) {
            show_progress(false, translate("Password missed"));
            return " ";
        }
        abLoading = true;
        var url = handler.get_api_server();
        httpRequest(url + "/api/login", #post, {username: name, password: pass, id: my_id, uuid: handler.get_uuid(), type: 'account', deviceInfo: getDeviceInfo()}, function(data) {
            if (data.error) {
                abLoading = false;
                var err = translate(data.error);
                show_progress(false, err);
                return;
            }
            if (data.type == 'email_check') {
                abLoading = false;
                show_progress(-1);
                on_2fa_check(data);
                return;
            }
            handler.set_local_option("access_token", data.access_token);
            set_local_user_info(data.user);
            show_progress(-1);
            if (myIdMenu) myIdMenu.update();
            getAb();
        }, function(err, status) {
            abLoading = false;
            err = translate(err);
            if (url.indexOf('rustdesk') < 0) err = url + ', ' + err;
            show_progress(false, err);
        });
        return " ";
      }, msgbox_default_height, get_msgbox_width());
}

function on_2fa_check(last_msg) {
    const isEmailCheck = !last_msg.tfa_type || last_msg.tfa_type == 'email_check';
    const secret = last_msg.secret;
    const emailHint = last_msg.user.email;

    msgbox("custom-2fa-verification-code", translate('Verification code'), <div .form .set-password> 
            { isEmailCheck && <div><span>{translate('Email')}:</span><span>{emailHint}</span></div> }
            <div><span>{translate(isEmailCheck ? 'Verification code' : '2FA code')}:</span><input|text name="verification_code" .outline-focus /></div> 
            { isEmailCheck && <div style="font-size:0.9em; margin-bottom:1em;">{translate('verification_tip')}</div> }
        </div>, "", 
        function(res=null, show_progress) {
            if (!res) return;
            show_progress();
            var code = (res.verification_code || '').trim();
            if (!code || code.length < 6) {
                show_progress(false, translate("Too short, at least 6 characters."));
                return " ";
            }
            abLoading = true;
            var url = handler.get_api_server();
            const loginData = {
                username: last_msg.user.name,
                id: my_id,
                uuid: handler.get_uuid(),
                type: 'email_code',
                verificationCode: code,
                tfaCode: isEmailCheck ? '' : code,
                secret: secret,
                deviceInfo: getDeviceInfo()
            };
            httpRequest(url + "/api/login", #post, loginData, 
                function(data) {
                    if (data.error) {
                        abLoading = false;
                        show_progress(false, data.error);
                        return;
                    }
                    handler.set_local_option("access_token", data.access_token);
                    set_local_user_info(data.user);
                    show_progress(-1);
                    if (myIdMenu) myIdMenu.update();
                    getAb();
                },
                function(err, status) {
                    abLoading = false;
                    err = translate(err);
                    if (url.indexOf('rustdesk') < 0) err = url + ', ' + err;
                    show_progress(false, err);
                }
            );
            return " ";
        },
        msgbox_default_height,
        get_msgbox_width()
    );
}

    handler.set_local_option("access_token", "");

    }
}

function logout() {
    var url = handler.get_api_server();
    httpRequest(url + "/api/logout", #post, {id: my_id, uuid: handler.get_uuid()}, function(data) {
    }, function(err, status) {
        msgbox("custom-error", translate('Error'), err);
    }, getHttpHeaders());
    reset_token();
}

function refreshCurrentUser() {
    var token = handler.get_local_option("access_token");
    if (!token) { return; }
    abLoading = true;
    abError = "";
    app.update();
    httpRequest(handler.get_api_server() + "/api/currentUser", #post, {id: my_id, uuid: handler.get_uuid()}, function(data) {
        if (data.error) {
            if (data.error == 'Invalid token') {
              reset_token();
            }
            handleAbError(data.error);
            return;
        }
	if (!handler.verify_login(data.verifier, token)) {
          handleAbError("Please update your self-hosting server Pro to latest version");
          return;
        }
        set_local_user_info(data);
        if (myIdMenu) myIdMenu.update();
        getAb();
    }, function(err, status) {
        if (status == 401 || status == 400) {
            reset_token();
        }
        handleAbError(err);
    }, getHttpHeaders());
} 

function getHttpHeaders() {
    return "Authorization: Bearer " + handler.get_local_option("access_token");
}

function getDeviceInfo() {
    return JSON.parse(handler.get_login_device_info());
}

function updateCctvLayout() {
    var container = $(#cctv-grid-container);
    if (!container) return;
    
    var base_w = app.cctv_cell_size || 300;
    
    var cell_w = base_w;
    var cell_h = (cell_w * 9 / 16).toInteger();
    
    if (cell_w < 50) cell_w = 50;
    if (cell_h < 30) cell_h = 30;
    
    app.cell_w = cell_w;
    app.cell_h = cell_h;
    
    var cw_str = cell_w.toString() + "px";
    var ch_str = cell_h.toString() + "px";
    
    // Update the DOM cell element sizes directly
    for (var cell in $$(.cctv-cell)) {
        cell.style#width = cw_str;
        cell.style#height = ch_str;
    }
}
